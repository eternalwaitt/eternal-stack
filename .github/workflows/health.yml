name: health

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-health:
    name: Repository Health Checks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          # No package install runs in this job; keep setup-node package-manager caching disabled.
          package-manager-cache: false

      - name: Install CLI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq fd-find ripgrep shellcheck python3
          sudo ln -sf "$(command -v fdfind)" /usr/local/bin/fd

      - name: Validate generated rule exports
        run: node scripts/sync-rule-exports.mjs --check

      - name: Hook tests
        run: tests/test-hooks.sh

      - name: Workflow tool tests
        run: tests/test-workflow-tools.sh

      - name: Install and rollback tests
        run: tests/test-install.sh

      - name: Doctor
        run: scripts/doctor.sh --jobs 4
