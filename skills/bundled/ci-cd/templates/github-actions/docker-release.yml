name: Build and Publish Image

# Production note: Trivy blocks HIGH/CRITICAL findings by default. Use the
# documented non-blocking escape hatch only with a tracked baseline and owners.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/OWNER/REPO

jobs:
  image:
    name: Build, scan, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@REPLACE_WITH_PINNED_SHA
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@REPLACE_WITH_PINNED_SHA

      - uses: docker/login-action@REPLACE_WITH_PINNED_SHA
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@REPLACE_WITH_PINNED_SHA
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=main,enable={{is_default_branch}}

      - uses: docker/build-push-action@REPLACE_WITH_PINNED_SHA
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Scan image
        uses: aquasecurity/trivy-action@REPLACE_WITH_PINNED_SHA
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          severity: HIGH,CRITICAL
          # Legacy-image escape hatch only: switch to "0" after recording a baseline artifact or tracked issue for each finding.
          exit-code: "1"
